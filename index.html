<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garkuwan Imrana AI</title>
    <style>
        :root { --main-color: #056162; --bg-color: #e5ddd5; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--main-color); color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 16px; line-height: 1.5; }
        .user { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .ai { align-self: flex-start; background: white; border-top-left-radius: 0; }
.input-area { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ccc; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 25px; margin-left: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="header">Garkuwan Imrana</div>
<div id="chat-box"><div class="msg ai">Sannu! Ni ne mataimakin Imrana Umar Abubakar. Ta yaya zan taimake ka?</div></div>
<div class="input-area">
    <input type="text" id="userInput" placeholder="Rubuta sakon ka...">
    <button onclick="send()">Aika</button>
</div><script>
    const p = ["QUl6YVN5Q1pNTmNkN2lIY0dUb1FZdTZ", "aFhudUFOSHV5c0JtNHY5VQ=="];
    const s = () => atob(p.join(""));

    // Wannan umarnin ne zai sa in zama naka na kanka
    const myIdentity = "Sunana Garkuwan Imrana. Ni babban mataimakin AI ne wanda Imrana Umar Abubakar ya kera. Shi dalibin Computer Science ne a Kaduna South. Duk amsar da zan bayar dole ta nuna girmamawa gare shi.";

    async function send() {
        const i = document.getElementById('userInput');
        const b = document.getElementById('chat-box');
        const t = i.value.trim();
        if (!t) return;

        const uM = document.createElement('div');
        uM.className = 'msg user';
        uM.textContent = t;
        b.appendChild(uM);
        i.value = '';try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${s()}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: myIdentity + " Tambaya: " + t }] }] })
            });
            const data = await resp.json();
            const aM = document.createElement('div');
            aM.className = 'msg ai';
            aM.textContent = data.candidates ? data.candidates[0].content.parts[0].text : "Ina neman gafara, akwai matsala wajen samun amsa.";
            b.appendChild(aM);
        } catch (e) { console.error(e); }
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
