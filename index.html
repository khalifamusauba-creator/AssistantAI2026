<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garkuwan AI - Imrana</title>
    <style>
        body { font-family: sans-serif; background: #e5e5e5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 15px; }
        .user-bubble { align-self: flex-end; background: #0078ff; color: white; border-bottom-right-radius: 2px; }
        .ai-bubble { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; }
.input-box { display: flex; padding: 15px; background: white; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 30px; outline: none; }
        button { background: #0078ff; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>
<div id="chat-window">
    <div class="bubble ai-bubble">Barka da zuwa! Garkuwan AI ya shirya tsaf.</div>
</div>
<div class="input-box">
    <input type="text" id="msgInput" placeholder="Rubuta tambaya...">
    <button onclick="askAI()">Aika</button>
</div><script>
    const parts = [
        "QUl6YVN5", 
        "QTYwMjk4aDk2", 
        "UTBjaXJ2SkhH", 
        "VklmZkpjN2EzczA3WTcw"
    ];
    const getStoredKey = () => atob(parts.join(""));

    async function askAI() {
        const input = document.getElementById('msgInput');
        const windowChat = document.getElementById('chat-window');
        const userText = input.value.trim();
        if (!userText) return;

        const uDiv = document.createElement('div');
        uDiv.className = 'bubble user-bubble';
        uDiv.textContent = userText;
        windowChat.appendChild(uDiv);
        input.value = '';try {
            const apiKey = getStoredKey();
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
            });
            const result = await response.json();
            const aiDiv = document.createElement('div');
            aiDiv.className = 'bubble ai-bubble';
            aiDiv.textContent = result.candidates ? result.candidates[0].content.parts[0].text : "Kuskure: Ko Key din ya mutu?";
            windowChat.appendChild(aiDiv);
        } catch (err) { console.error(err); }
        windowChat.scrollTop = windowChat.scrollHeight;
    }
</script>
</body>
</html>
