<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garkuwan AI - Imrana</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 16px; line-height: 1.4; }
        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }
.input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        button { background: #0084ff; color: white; border: none; padding: 10px 20px; margin-left: 8px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div id="chat-window"><div class="bubble ai">Sannu Imrana! Garkuwan AI ya shirya tsaf.</div></div>
<div class="input-area">
    <input type="text" id="userInput" placeholder="Rubuta sako...">
    <button onclick="ask()">Aika</button>
</div><script>
    // Mun boye sabon Key dinka (AIzaSyCZMNcd7iHcGToQYu6ZXnuANHuysBm4v9U)
    const p = ["QUl6YVN5Q1pNTmNkN2lIY0dUb1FZdTZ", "aFhudUFOSHV5c0JtNHY5VQ=="];
    const s = () => atob(p.join(""));

    async function ask() {
        const i = document.getElementById('userInput');
        const b = document.getElementById('chat-window');
        const t = i.value.trim();
        if (!t) return;

        const uD = document.createElement('div');
        uD.className = 'bubble user';
        uD.textContent = t;
        b.appendChild(uD);
        i.value = '';try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${s()}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] })
            });
            const d = await r.json();
            const aD = document.createElement('div');
            aD.className = 'bubble ai';
            if (d.candidates && d.candidates[0].content.parts[0].text) {
                aD.textContent = d.candidates[0].content.parts[0].text;
            } else {
                aD.textContent = "Google bai bada amsa ba. Ko an toshe Key din?";
            }
            b.appendChild(aD);
        } catch (e) { 
            const eD = document.createElement('div');
            eD.className = 'bubble ai';
            eD.textContent = "An samu matsalar network.";
            b.appendChild(eD);
        }
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
