<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garkuwan Imrana AI</title>
    <style>
        :root { --bg: #000000; --chat-bg: #121212; --text: #e0e0e0; --sidebar: #1a1a1a; --primary: #007bff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 0; background: var(--sidebar); color: white; transition: 0.3s; overflow-x: hidden; display: flex; flex-direction: column; z-index: 1000; }
        .sidebar.active { width: 260px; }
        .sidebar-header { padding: 20px; font-weight: bold; border-bottom: 1px solid #333; }
        .history-list { flex: 1; padding: 15px; font-size: 14px; color: #888; }
.main-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .header { background: var(--sidebar); padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .menu-btn { font-size: 26px; cursor: pointer; color: #bbb; margin-right: 15px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .u { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .a { align-self: flex-start; background: #2c2c2e; color: #e0e0e0; border-bottom-left-radius: 2px; }.input-container { padding: 15px; background: var(--bg); }
        .input-box { background: #1c1c1e; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid #333; }
        .plus-btn { font-size: 28px; color: #888; cursor: pointer; margin-right: 10px; display: flex; align-items: center; }
        .model-select { border: none; outline: none; background: #333; border-radius: 15px; padding: 5px 10px; font-size: 12px; margin: 0 10px; color: white; }
        input[type="text"] { flex: 1; border: none; outline: none; padding: 10px; font-size: 16px; background: transparent; color: white; }
        .send-btn { color: var(--primary); font-size: 24px; cursor: pointer; background: none; border: none; }
    </style>
</head><body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">Tarihin Hira</div>
    <div class="history-list" id="history">Babu tarihin hira...</div>
</div>
<div class="main-chat">
    <div class="header">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <div style="font-weight: bold; color: white;">Garkuwan AI</div>
    </div>
    <div id="chat"><div class="msg a">Sannu! Ni ne Garkuwan AI na Imrana. A shirye nake in duba abunda ka turo in amsa tambayoyinka.</div></div>
    <div class="input-container">
        <div class="input-box">
            <label class="plus-btn" for="f">+</label>
            <input type="file" id="f" style="display:none" onchange="previewFile()">
            <select class="model-select"><option>Fast</option></select>
            <input type="text" id="t" placeholder="Resarch...">
            <button class="send-btn" onclick="ask()">➤</button>
        </div>
    </div>
</div><script>
    let b64 = ""; let mime = "";
    
    // Wannan aikin sa ne ya bude ko ya rufe Sidebar (Tarihin hira)
    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('active'); 
    }
    
    // Wannan yana kula da hoto idan ka danna alamar + Kuma Ya aje hoton idan ka gama rubutusai kayi past tare
    function previewFile() {
        const file = document.getElementById('f').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            b64 = reader.result.split(',')[1]; 
            mime = file.type;
            const b = document.getElementById('chat');
            // Hoto zai nuna a chat amma ba zai tafi Vercel ba tukunna har sai ka danna tura
            b.innerHTML += `<div class="msg u" style="background:#444">🖼️ An zaba: ${file.name}<br><small>Yanzu rubuta tambaya ka danna ➤</small></div>`;
            b.scrollTop = b.scrollHeight;
        };
        if (file) reader.readAsDataURL(file);
    }async function ask() {
        const i = document.getElementById('t'); 
        const b = document.getElementById('chat');
        const txt = i.value.trim(); 
        
        // Idan babu rubutu kuma babu hoto, kada komai ya faru
        if (!txt && !b64) return;
        
        // Nuna sakon mutum a shafi
        b.innerHTML += `<div class="msg u">${txt}</div>`; 
        i.value = "";
        b.scrollTop = b.scrollHeight;
        
        try {
            // Kiran netlify  dinka
            const res = await fetch('https://umarkng.netlify.app/.netlify/functions/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: txt, image: b64, mimeType: mime })
            });
            
            const data = await res.json();
            // Nuna amsar AI a shafi
            b.innerHTML += `<div class="msg a">${data.reply || "Yi hakuri, ban samu amsa ba."}</div>`;
            
            // Share hoton bayan ya riga ya tafi domin tura wani sabon
            b64 = ""; mime = ""; 
        } catch (e) { 
            b.innerHTML += `<div class="msg a" style="color:#ff6b6b">Matsalar Network! Tabbatar ka yi Redeploy a netlify.</div>`; 
        }
        b.scrollTop = b.scrollHeight;
    }
</script>
