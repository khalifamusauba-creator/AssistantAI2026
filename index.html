<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garkuwan AI</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 16px; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background-color: #0084ff; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background-color: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }#input-area { display: flex; padding: 10px; background: white; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        button { background: #0084ff; color: white; border: none; padding: 10px 20px; margin-left: 8px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div id="chat-container"><div class="message ai">Barka da zuwa! Ni ne Garkuwan AI. Ina jiran tambayar ka.</div></div>
<div id="input-area"><input type="text" id="user-input" placeholder="Rubuta sakon ka..."><button onclick="sendMessage()">Aika</button></div><script>
    const API_KEY = "AIzaSyDXrRfKSI7a68WgEg6zdrzTRG0g46OSG5E";
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();
        if (!text) return;

        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.textContent = text;
        container.appendChild(userDiv);
        input.value = '';
        container.scrollTop = container.scrollHeight;try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: text }] }],
                    safetySettings: [
                        { "category": "HARM_CATEGORY_HARASSMENT", "threshold": "BLOCK_NONE" },
                        { "category": "HARM_CATEGORY_HATE_SPEECH", "threshold": "BLOCK_NONE" },
                        { "category": "HARM_CATEGORY_SEXUALLY_EXPLICIT", "threshold": "BLOCK_NONE" },
                        { "category": "HARM_CATEGORY_DANGEROUS_CONTENT", "threshold": "BLOCK_NONE" }
                    ]
                })
            });const data = await res.json();
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai';
            
            if (data.candidates && data.candidates[0].content) {
                aiDiv.textContent = data.candidates[0].content.parts[0].text;
            } else {
                aiDiv.textContent = "Yi hakuri, Google ya ki bada amsa.";
            }
            container.appendChild(aiDiv);
        } catch (e) { 
            const errDiv = document.createElement('div'); errDiv.className = 'message ai';
            errDiv.textContent = "An samu kuskure wajen jona wa.";
            container.appendChild(errDiv);
        }
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
